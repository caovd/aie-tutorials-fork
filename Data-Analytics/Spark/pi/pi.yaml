apiVersion: "sparkoperator.hpe.com/v1beta2"
kind: SparkApplication
metadata:
  name: spark-pi
  namespace: <username>
spec:
  type: Python
  sparkVersion: 3.5.5
  mode: cluster
  image: lr1-bd-harbor-registry.mip.storage.hpecorp.net/develop/hpe-spark/spark:v3.5.5.2.3
  imagePullPolicy: Always
  mainApplicationFile: "local:///mounts/shared-volume/shared/aie-tutorials/current-release/Data-Analytics/Spark/pi/pi.py"
  restartPolicy:
    type: Never
  imagePullSecrets:
    - imagepull
  driver:
    labels:
      version: 3.5.5
    cores: 1
    coreLimit: "1"
    memory: 512m    
  executor:
    labels:
      version: 3.5.5
    cores: 1
    coreLimit: "1"
    memory: 512m
    instances: 1
  volumes:
    - name: shared-volume
      persistentVolumeClaim:
        claimName: kubeflow-shared-pvc

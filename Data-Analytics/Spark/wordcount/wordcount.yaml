apiVersion: "sparkoperator.hpe.com/v1beta2"
kind: SparkApplication
metadata:
  name: word-count
  namespace: <username>
spec:
  type: Python
  sparkVersion: 3.5.2
  mode: cluster
  image: lr1-bd-harbor-registry.mip.storage.hpecorp.net/develop/hpe-spark/spark-3.5.2:v3.5.2.1.1
  imagePullPolicy: Always
  mainApplicationFile: "local:///mounts/shared-volume/shared/aie-tutorials/current-release/Data-Analytics/Spark/wordcount/wordcount.py"
  arguments:
  - file:///mounts/shared-volume/shared/aie-tutorials/current-release/Data-Analytics/Spark/wordcount/wordcount.txt
  restartPolicy:
    type: Never
  imagePullSecrets:
    - imagepull
  driver:
    labels:
      version: 3.5.2
    cores: 1
    coreLimit: "1"
    memory: 512m    
  executor:
    labels:
      version: 3.5.2
    cores: 1
    coreLimit: "1"
    memory: 512m
    instances: 1
  volumes:
    - name: shared-volume
      persistentVolumeClaim:
        claimName: kubeflow-shared-pvc
